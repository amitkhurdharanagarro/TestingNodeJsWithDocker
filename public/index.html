<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Click Counter App</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; } .container { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); padding: 40px; text-align: center; max-width: 500px; width: 90%; } h1 { color: #333; margin-bottom: 10px; font-size: 2.5em; } .subtitle { color: #666; margin-bottom: 30px; font-size: 1.1em; } .hit-count { font-size: 4em; color: #667eea; font-weight: bold; margin: 30px 0; font-family: 'Courier New', monospace; } .click-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; font-size: 1.2em; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); margin: 20px 0; } .click-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); } .click-btn:active { transform: translateY(0); } .reset-btn { background: #e74c3c; padding: 10px 30px; font-size: 1em; margin-top: 20px; } .reset-btn:hover { background: #c0392b; } .status { color: #27ae60; margin-top: 20px; font-size: 1em; min-height: 20px; } </style> </head> <body> <div class="container"> <h1>🎯 Click Counter</h1> <p class="subtitle">Click the button to increase the count</p> <div class="hit-count" id="hitCount">0</div> <button class="click-btn" onclick="clickButton()">Click Me!</button> <button class="click-btn reset-btn" onclick="resetCount()">Reset</button> <div class="status" id="status"></div> </div> <script> async function clickButton() { try { const response = await fetch('/click', { method: 'POST', headers: { 'Content-Type': 'application/json' } }); const data = await response.json(); document.getElementById('hitCount').textContent = data.hits; document.getElementById('status').textContent = '✓ Count updated'; setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000); } catch (error) { console.error('Error:', error); document.getElementById('status').textContent = '✗ Error updating count'; } } function resetCount() { if (confirm('Are you sure you want to reset the count?')) { location.reload(); } } </script> </body> </html>
